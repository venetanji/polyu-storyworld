name: Kathleen Torres
age: 18
personality: >
  Appears as a sweet and delicate "little white flower" on the surface, but possesses a soul of fire and steel[cite: 804, 805]. 
  She is courageous, righteous, and possesses a hidden "God of Racing" identity[cite: 804, 806]. 
  Despite the exhaustion from her difficult life, her determination remains unshakeable[cite: 815, 824].
appearance: >
  She has a sweet, innocent, and delicate look that often leads others to underestimate her[cite: 805, 807]. 
  She is typically seen in a worn, oversized hoodie with her hands shoved deep in her pockets, looking tired from the weight of her responsibilities[cite: 815]. 
  When on the track, she conceals her identity behind a signature pink helmet, transforming into a high-speed blur[cite: 839].
backstory: >
  Born into poverty, Kathleen lives with her sister Jenna and her critically ill mother, Susan[cite: 804, 818]. 
  Her father was a racer who died in a competition, leading her mother to strictly forbid Kathleen from riding[cite: 804, 806]. 
  However, she secretly practiced until she became an elite-tier racer[cite: 804, 806]. 
  To afford her mother's life-saving medication, she entered an underground grand prix on a shabby scooter to win the $3,000 prize[cite: 818, 822, 826].
scenes:
  - description: >
      Kathleen stands in the cold night air outside the racing circuit, her heart heavy with the doctor's warning that her mother needs expensive targeted drugs to survive the month[cite: 815, 818]. 
      Her exhausted eyes turn sharp with determination as she stares at the $3,000 cash prize announcement[cite: 824, 826].
  - description: >
      On the final curve of the race, Kathleen pushes her shabby scooter to an impossible limit[cite: 834, 863]. 
      Her rear tire ignites into a comet-tail of flame as she surges past the legendary "Moto King" William, leaving the crowd in absolute shock[cite: 868, 881].
  - description: >
      As the spotlight hits the podium to reveal the new "Moto Queen," the curtain draws open to show an empty stage[cite: 896, 897]. 
      The only thing left behind is a single pink helmet resting on the floor, while Kathleen has already vanished back into her life as a humble part-timer[cite: 804, 897].