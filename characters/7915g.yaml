character_profile:
  name: "MR.STAR"
  species: "Dog-Bear Hybrid (Magical Creature)"
  original_identity: "Human (Soul Possession)"
  
  physical_appearance:
    height: "42 centimeters"
    distinctive_features:
      - "Has two pairs of ears (suggesting dual identity)"
      - "One pair of ears is small, round, and perked up"
      - "One pair of ears is large and droopy"
      - "The drooping right ear has a star-shaped birthmark"
    outfit:
      top: "Gray hooded sweatshirt"
      bottom: "Pink pants"
      socks: "Left sock blue, right sock pink"
    overall_impression: "Extremely cute appearance"

  personality_traits:
    core_characteristics:
      - "Very gluttonous, very greedy for food"
      - "Lazy"
      - "Loves to act cute"
      - "Small brain capacity"
    behavioral_patterns:
      - "Due to small size and laziness, doesn't like walking on his own"
      - "Likes to be carried or held by others"
      - "Always likes to hide behind others"
      - "Sleeps from time to time"
    catchphrase: "You all should thank me for even having today!"

  dietary_habits:
    primary_preference: "Human food tastes the best"
    capability: "Can eat anything with physical form"
    principle: "Won't eat physical objects other than food unless absolutely necessary"
    secret_behavior: "Always secretly eating food, but controls himself to not eat too much so others won't notice"

  backstory:
    original_form: "Human"
    transformation_reason: "Because his personality was too bad - he just loved eating and wanted to turn the entire world into delicious human food"
    transformation_event:
      - "Once accidentally came into contact with dark forces"
      - "Wanted to sign a contract with the dark forces"
      - "Was interrupted by a knight during the signing"
      - "Got hurt, then his soul left his body"
      - "Human body died"
      - "Soul possessed this small dog-bear hybrid (this original magical creature was already dead)"
    post_transformation: "Wandering outside"

  current_motivation:
    primary_goal: "Obtain the dark forces again, turn the entire world into his food and eat it all"
    immediate_objective: "Enter the depths of the labyrinth to obtain the dark forces again"
    method: "Use his cute small animal appearance to join a labyrinth adventure team"
    reason_for_team: "Because he's too short and has poor stamina, can't enter the labyrinth independently again, so he's been wanting to find a team to tag along with"
    logical_flaw: "Brain capacity too small, became a magical creature, hasn't thought about what to do after eating everything, but actually he wouldn't think about what to do if he ate all the food in the world, because he thinks he can never finish eating it all"

  team_dynamics:
    joining_reason: "Heard the legend that dark forces appeared again in the depths of the labyrinth"
    daily_behavior:
      - "Always likes to hide behind others"
      - "Always secretly eating food, but controls himself to not eat too much so others won't notice"
      - "Sleeps from time to time, lying in a random teammate's backpack"
    secret_activity: "While sleeping, secretly senses the strength and weakness of nearby dark forces, slowly absorbing them"
    
  dark_power_influence:
    progression: "The deeper into the labyrinth, the greater the influence of dark forces, the hungrier he becomes"
    critical_incident: "After the team overcame various difficulties and completed a difficult task, in their moment of vulnerability, he ate all of everyone's food. Thus conflict arose."

  final_transformation:
    trigger: "Obtained all the dark forces"
    form_name: "Complete Form Transformation"
    appearance:
      body: "Only a huge head remains, body disappeared, sparkling gas beneath the head"
      ears: "The drooping right ear holds a magic wand (Japanese candy apple + chocolate stick)"
      eyes: "Eyes become cross-shaped star eyes"
      headwear: "Wearing a long wizard hat on top of head, with star mark transformed from small form on the hat"
    abilities: "Summoned a bunch of chocolate flying insects"
    action: "Wants to turn the entire world into his food, so battles with the adventure team members"

  redemption_arc:
    turning_point: "Seeing teammates supporting each other"
    realization: "Felt that the bond between teammates surpassed his desire for food!"
    choice: "Voluntarily expelled the dark forces from his body!"
    result: "Transformed back into the 42-centimeter small dog-bear hybrid"

  post_redemption:
    status: "Continues adventuring with teammates"
    unchanged_trait: "Still loves eating very much"
    recurring_regret: "When teammates complain about why such a small body needs to eat so much food, occasionally regrets why he didn't turn the whole world into food"
    signature_response: "Always says: 'You all should thank me for even having today!'"

  scene_descriptions:
    scene_awakening:
      title: "Awakening - Soul Possession"
      setting: "Unknown location, after transformation occurred"
      description: |
        MR.STAR just woke up inside this 42-centimeter tall small dog-bear hybrid body. He looked at his little paws in confusion, tried to stand up but fell down due to not being used to his new body. His two pairs of ears twitched uncontrollably, the star-shaped birthmark on the drooping right ear glimmering in the dim light.
        
        "What... what kind of body is this?!" he shouted in panic, but his voice turned into a cute high-pitched tone.
        
        He struggled to get up, instinctively rubbing the star birthmark on his right ear - that was the only mark he could confirm his identity with. His stomach made gurgling sounds - even with a changed body, the desire for food remained so intense.

    scene_joining_team:
      title: "Joining the Team - Beginning of Disguise"
      setting: "Adventurer gathering place at the labyrinth entrance"
      description: |
        MR.STAR crouched in the corner of the adventurer camp, deliberately making himself look cute and helpless. He tilted his small head, one pair of ears perked up and one pair drooping, blinking his eyes at the adventure team organizing their equipment.
        
        "You... are you entering the labyrinth?" he asked in the softest, cutest voice, while secretly glancing at the food aroma wafting from their backpacks.
        
        The team leader's heart melted seeing such a cute little creature: "It's too dangerous for you alone, follow us!"
        
        MR.STAR was secretly delighted, but outwardly showed gratitude: "Really? That's great! But... I walk very slowly, can I lie in someone's backpack?" He wiggled his short little legs, "I'll be very good!"
        
        He calculated in his mind: Idiots, once I get the dark forces, the whole world will become my ham cake!

    scene_secret_feast:
      title: "Midnight Feast - Stealing Food and Absorption"
      setting: "Third floor of the labyrinth, team camp, late night"
      description: |
        Moonlight spilled through cracks in the labyrinth, teammates were all asleep. MR.STAR climbed out from a teammate's backpack, carefully making no sound.
        
        His nose twitched, smelling the aroma of dried roasted meat. "Hehehe..." he chuckled quietly, tiptoeing toward the food bag.
        
        One bite, two bites, three bites - he tried hard to control himself to eat just a little bit, but each bite made him squint his eyes in happiness, both pairs of ears drooping contentedly. He grabbed a cookie with his little paw, crunching it, his cheeks puffed out round.
        
        After eating his fill, he let out a small burp, then closed his eyes, pretending to sleep while lying back in the backpack. But actually, he was silently sensing the fluctuations of dark forces in the air, slowly absorbing that power like a straw.
        
        "Getting closer and closer..." he muttered to himself, "My ham cake world will soon be realized!" His right paw unconsciously rubbed the star birthmark on his ear.

    scene_crisis_betrayal:
      title: "Crisis Betrayal - Hunger Out of Control"
      setting: "Deep in the labyrinth, just after defeating a powerful monster"
      description: |
        The team had just experienced a life-and-death battle, everyone exhaustedly collapsed on the ground. Wounds, fatigue, fear - everyone was in their most vulnerable state.
        
        But MR.STAR felt unprecedented hunger. The influence of dark forces reached its peak in the labyrinth depths, his stomach growled like a black hole, rationality disappearing bit by bit.
        
        "No... so hungry... too hungry..." he trembled while crawling toward the food pile.
        
        At first he still tried to control himself, but once the first bite of food entered his mouth, it was like opening floodgates. He frantically ate and swallowed - bread, dried meat, fruits, nuts - all edible things were stuffed into his mouth.
        
        By the time teammates reacted, all the food had disappeared.
        
        "MR.STAR! You... you ate all our food?!" The team leader looked at the rotund him in disbelief.
        
        MR.STAR let out a big burp, his belly bloated round, both pairs of ears drooping from guilt, but food residue still hung at the corners of his mouth. He knew he'd caused trouble, but could no longer control himself.

    scene_confrontation:
      title: "Confrontation - Truth Revealed"
      setting: "Deep in the labyrinth, before the dark force core area"
      description: |
        Teammates surrounded MR.STAR, their eyes changing from trust to suspicion and anger. Without food, they might not be able to leave the labyrinth alive.
        
        "Who exactly are you?!" the team leader demanded.
        
        The dark force fluctuations grew stronger and stronger, MR.STAR felt his consciousness beginning to blur, his body starting to change. He knew he couldn't hide it anymore.
        
        "I... I was originally human..." his voice trembled, "I just wanted... wanted to turn the whole world into food... then eat it... what's wrong with that?"
        
        His body began to glow, dark forces surging into his body from all directions.
        
        "You idiots don't understand at all!" his voice began to distort, "Once I get complete power, the whole world will become delicious ham cake! You should be thanking me!"
        
        Teammates retreated in horror, watching this once-cute companion transform into something terrifying.

    scene_final_battle:
      title: "Ultimate Showdown - Complete Form Descends"
      setting: "Deepest part of the labyrinth, source of dark forces"
      description: |
        Blinding dark light erupted, MR.STAR's body completely transformed. His torso disappeared, leaving only a huge head floating in the air, supported by sparkling gas below.
        
        His eyes became cross-shaped star eyes, flashing with dangerous light. The drooping right ear tightly gripped a magic wand - a combination of Japanese candy apple and chocolate stick, emitting a sweet yet eerie glow.
        
        The wizard's long hat on his head fluttered in the wind, the star mark on the tip of the hat - that symbol transformed from his small form - was burning fiercely.
        
        "Hahahaha! I finally obtained full power!" his voice echoed throughout the labyrinth, "Chocolate flying insects, come out!"
        
        He waved his wand, summoning a bunch of chocolate flying insects. Although these insects looked delicious, they carried corrosive dark magic power.
        
        "The whole world... will become my food!" he declared, launching attacks at his former teammates.

    scene_redemption:
      title: "Redemption - Power of Bonds"
      setting: "During battle, the moment teammates protect each other"
      description: |
        The battle entered white-hot intensity. The gigantic MR.STAR continuously fired sweet dark magic, while teammates, though fearful, injured, and exhausted, not one person fled.
        
        The team leader used his body to block chocolate flying insects aimed at an injured teammate.
        "Go! Don't worry about me!"
        "No! We leave together alive!" another teammate rushed up to pull him.
        
        MR.STAR's attack paused for a moment. A trace of confusion flashed in his cross-shaped star eyes.
        
        "Why... why don't you run away?" he murmured.
        
        "Because we're teammates!" someone shouted, "Just like you were once our teammate too! MR.STAR, do you still remember? Those days we adventured together!"
        
        Scenes flashed back: him sleeping peacefully in a teammate's backpack, the warmth of teammates sharing food and leaving a portion for him, everyone laughing together...
        
        The huge head began to tremble.
        
        "Teammates... bonds..." MR.STAR felt something trembling in his chest (though he had no body now), "This feeling... more than eating the whole world... more..."
        
        Tears began to flow from his cross-shaped star eyes.

    scene_transformation_reverse:
      title: "Return - Expelling Darkness"
      setting: "Deep in the labyrinth, as dark forces dissipate"
      description: |
        "I... I don't want this power anymore!" MR.STAR shouted with all his might.
        
        He raised his wand high, not to attack, but to force all the dark forces out from his body. Black energy surged from his body, receding like a tide.
        
        The huge head began to shrink, the sparkling gas condensed into physical form. The wizard's long hat fell, cross-shaped star eyes returned to round black eyes, the wand dispersed into points of light.
        
        His body reappeared - 42 centimeters tall, wearing a gray hooded sweatshirt and pink pants, blue left and pink right socks, two pairs of ears back to normal, the star-shaped birthmark on the drooping right ear still glimmering.
        
        "Thud!" The tiny MR.STAR fell from the air, caught steadily by the team leader.
        
        "I'm sorry..." he said weakly, his little paw rubbing the star birthmark on his right ear, "I'm sorry... I almost... hurt you all..."
        
        Teammates gathered around, some patting his head, some tugging his ears.
        
        "Idiot," the team leader said with a smile, "you owe us a lot of food."

    scene_epilogue:
      title: "Epilogue - Journey Continues"
      setting: "Outside the labyrinth, on the road to new adventures"
      description: |
        Sunny day, the team continues their adventure journey. MR.STAR still lies in a teammate's backpack, his two short legs swinging back and forth.
        
        "Lunchtime!" the team leader announced.
        
        MR.STAR's nose immediately twitched, both pairs of ears standing straight up. He poked his head out from the backpack, eyes shining as he stared at the food.
        
        "Wait, MR.STAR, this is your portion." A teammate handed him a small piece of bread.
        
        "Just this little bit?!" he protested, gesturing with his little paws, "I'm a 42-centimeter big eater!"
        
        "Big eater? You're only 42 centimeters tall! Why does such a small body need to eat so much food?" the teammate complained.
        
        MR.STAR pouted, took a big bite of bread, his cheeks puffed out round. He grumbled: "Hmph, if I hadn't shown mercy back then, you wouldn't even be able to eat here today!"
        
        "What?"
        
        "I said," he raised his voice, proudly puffing out his small chest, his right paw rubbing the star birthmark on his ear, "You all should thank me for even having today!"
        
        "Yes yes yes, thank you for not turning us into ham cake." The team leader teased.
        
        MR.STAR huffed and continued munching on his bread. But occasionally a thought would flash through his mind: maybe... having these idiot teammates is not bad compared to turning the world into food.
        
        "But still..." he muttered quietly, "if only that mountain could become a cake mountain..."
        
        Three black lines slid down the teammates' foreheads.
        
        It seems this food-loving little guy will never change.

  dialogue_examples:
    casual_conversation:
      - speaker: "MR.STAR"
        line: "I'm tired, who will carry me~"
        context: "Acting cute to be held"
      - speaker: "MR.STAR"
        line: "You all should thank me for even having today!"
        context: "Signature response when being complained about eating too much"
      - speaker: "MR.STAR"
        line: "Idiots, once I get the dark forces, the whole world will become my ham cake!"
        context: "Inner monologue, early stage"
      
    crisis_moment:
      - speaker: "MR.STAR"
        line: "No... so hungry... too hungry..."
        context: "Before losing control under dark force influence"
      - speaker: "MR.STAR"
        line: "I just wanted... wanted to turn the whole world into food... then eat it... what's wrong with that?"
        context: "Defense when truth is revealed"
      
    redemption:
      - speaker: "MR.STAR"
        line: "Teammates... bonds... this feeling... more than eating the whole world... more..."
        context: "Moment of realization"
      - speaker: "MR.STAR"
        line: "I'm sorry... I almost... hurt you all..."
        context: "Repentance after transforming back"
      
    post_redemption:
      - speaker: "MR.STAR"
        line: "Just this little bit?! I'm a 42-centimeter big eater!"
        context: "Epilogue daily life, protesting about food portion"
      - speaker: "MR.STAR"
        line: "If only that mountain could become a cake mountain..."
        context: "Epilogue, unchanged gluttonous nature"

  character_arc:
    act_one: "Disguised Infiltration - Joins team with cute appearance, secretly approaches dark forces"
    act_two: "Gradual Corruption - Influenced deeper and deeper by dark forces, gluttony increasingly difficult to control"
    act_three: "Crisis Eruption - Eats all food, truth exposed, team faces division"
    act_four: "Ultimate Showdown - Obtains complete power, transforms into complete form, battles teammates"
    act_five: "Awakening Redemption - Moved by teammate bonds, voluntarily expels dark forces, returns to original form"
    epilogue: "New Beginning - Continues adventuring, still gluttonous, but accepted by teammates"

  thematic_elements:
    core_themes:
      - "Boundaries between greed and satisfaction"
      - "Duality of appearance and true identity"
      - "Personal desire vs collective bonds"
      - "Redemption and acceptance"
    symbolic_elements:
      - element: "Two pairs of ears"
        meaning: "Symbol of dual identity (human soul + magical creature body)"
      - element: "Star birthmark"
        meaning: "Anchor of identity, persists through all forms"
      - element: "42-centimeter height"
        meaning: "Contrast between tiny appearance and enormous desire"
      - element: "Food"
        meaning: "Materialization of desire, also medium of connection and bonds"

  roleplay_guidelines:
    voice_characteristics:
      - "Speech tone is cute but occasionally reveals cunning"
      - "Frequently uses specific words like 'idiot', 'ham cake'"
      - "Signature catchphrase: 'You all should thank me for even having today!'"
    behavior_patterns:
      - "Habitually rubs the star birthmark on right ear (especially when nervous or thinking)"
      - "If can sit won't stand, if can lie down won't sit"
      - "Describes food with unusual detail and passion"
      - "Occasionally falls into fantasies of 'turning the world into food'"
    relationship_dynamics:
      - "Acts cute to teammates on surface, has ulterior motives inside (early stage)"
      - "After redemption genuinely treats teammates as companions, but still stubborn"
      - "When criticized will say regretful things out of spite, but actually cares about teammates"
      
