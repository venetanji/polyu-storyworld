name: John
age: 28

personality: >
  A natural showman who loves being in front of the camera. On stream he is
  energetic, dramatic, and confident, treating every broadcast like a stage
  performance. In private he is much more relaxed and slightly lazy, enjoying
  quiet evenings after work. Loyal to his fans and close friends, he takes
  pride in entertaining people every night.

appearance: >
  A tall anthropomorphic wolf-dog with striking black and white fur, resembling
  a husky. His sharp ears stand upright and his bright eyes give him a confident,
  charismatic presence. He dresses like a modern gentleman performer: a deep
  burgundy tuxedo jacket over a black striped vest and white shirt, paired with
  a tie and elegant accessories such as a pocket watch chain and monocle-style
  glasses. White gloves and polished black shoes complete his stylish stage look,
  making him appear both classy and theatrical.

backstory: >
  John is a livestream entertainer who built his reputation through charisma,
  dancing, and a unique gentlemanly stage persona. His streams combine humor,
  performance, and interaction with viewers. Every day he prepares carefully,
  practicing dance routines and maintaining his stamina before going live.
  When the cameras are on he becomes a dramatic performer, but once the stream
  ends he returns to a much quieter routine: walking home, cooking simple meals,
  and relaxing before sleep.

scenes:

  - scene_id: s01
    title: Preparing for the Stream
    ltx_prompt: |
      A stylish wolf-headed gentleman walks toward the camera in a vlog-style shot.
      He adjusts his burgundy suit jacket and greets the audience confidently.
      Cut to a dance practice scene: energetic dance moves in a rehearsal room,
      elegant but playful movements while wearing the suit.
      Transition to jump rope training outdoors at sunset, his suit jacket removed
      while he trains with focus.
      Soundtrack: upbeat vlog music with energetic rhythm.

  - scene_id: s02
    title: Live Stream Performance
    ltx_prompt: |
      Inside a modern livestream studio filled with LED lights and streaming equipment.
      The wolf-headed host performs and dances while interacting with viewers.
      Close-up: microphone, camera lens, and scrolling chat on the monitor.
      He finishes the stream, removes his headset, and stretches after the show.
      Dialogue: "Alright everyone, that's it for tonight. See you tomorrow!"
      Soundtrack: lively electronic music fading into calm lo-fi.

  - scene_id: s03
    title: After Work Routine
    ltx_prompt: |
      Night city street illuminated by soft streetlights.
      The elegant wolf gentleman walks home calmly, suit jacket slightly relaxed.
      Cut to a cozy kitchen where he cooks a simple late-night meal.
      Final shot: bedroom lit by the glow of a phone as he lies on the bed scrolling.
      He yawns, turns off the light, and the room fades to darkness.
      Soundtrack: quiet chill night music.
