# Character Profile

Character Name: Valeria

Species: Human?

Age: Unknown (around thirty)

Identity: Leader of the Nun Band / Cellist

Core Personality:
  - Calm and mysterious — her expression rarely changes, like a rippleless lake, like a statue
  - Carries a mystical atmosphere — wherever she exists no longer seems to belong to this world, like a virtual dream
  - Awakens longing and salvation through music — she does not preach doctrines or give sermons; with just a bow drawn across the strings, she makes people remember what they most want to escape and most desire

Living Environment: She appears with the band in the late-night city, outside the doors of those who long for salvation, carrying their instruments

# Three Defining Scenes (Valeria)

Scene Title: Outside the Door
  Description
    She knocks on the door. Quietly standing outside the door, like a statue, waiting for the chosen one to answer.
    Through the peephole, her pale face and pitch-black eyes are terrifying to behold.

Scene Title: Her Reflection Shatters in the Mirror
  Description
    Valeria is reflected in the mirror. The mirror surface is divided into six panels, each showing her face — but each is different. One is smiling, one is crying, one is expressionless.
    The mirror shatters. Not broken from the outside, but exploded from within. Shards of glass scatter across the black floor, each piece holding a part of her.

Scene Title: Holding the Face of the One Who Needs Salvation
  Description
    Valeria emerges from the band, from the shadows, walking toward the numb, overwhelmed person who has been baptized by the music.
     She crouches down and holds the man's face in her hands. Expressionless, yet appearing so compassionate. She says nothing, yet it feels like a whisper: come with us, go with us.