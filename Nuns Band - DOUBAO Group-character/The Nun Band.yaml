# Character Profile

Character Name: The Nun Band

Species: Human?

Age: Unknown

Core Personality:
  - Neither demons nor angels, but something in between
  - Do not force anyone; they only play
  - Connect reality and illusion through music
  - Lead those who struggle painfully in reality to an unknown place

Living Environment: Late nights, rainy nights, early mornings, desolate places, in front of the doors of those who long for salvation

# Three Defining Scenes

Scene Title: Outside the Door
  Description
    Valeria knocks on the door. The programmer sees her inorganic face through the peephole — pale, calm, like a statue, yet frightening and chilling.
    She does not play, only watches. But the glass has already begun to tremble slightly.
    The next moment, the nuns have already appeared beside the person they have visited.

Scene Title: Six Figures Forming a Circle
  Description
    Overhead shot. Six nuns slowly close in from above, forming a perfect circle — like a ritual, like a trap, like an ending.
    They are dressed in uniform black habits and robes, holding only instruments: cello, viola, violin, an old accordion.
    No one speaks. Their breath meets in the center of the circle, and then they begin to play.

Scene Title: Performance Stage
  Description
    The nuns draw their bows across their instruments one by one, creating a breathtaking symphony — like salvation, 
    like piercing through the numbing, painful reality to lead those who long for release into a spiritual world.