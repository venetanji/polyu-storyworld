# Character Profile

Character Name: Elias

Species: Human

Age: 26 years old

Core Personality:
  - Crushed by reality, exhausted and numb  
  - Longing to escape, fragile inside
  - Sensitive, easily overwhelmed by emotions

Living Environment: Chinatown antique shop


# Three Defining Scenes

Scene Title: 3 AM Code
  Description
    Late at night, the only light in the apartment is the blue glow from the screen on Elias's face. He stares at a screen full of error messages, his fingers hovering over the keyboard,
    but he can no longer type. Exhausted, he lays his head down on the desk to rest.
  

Scene Title: In Front of the Rainy Night Door
  Description
  In the early morning hours, the sound of rain taps against the window. A slow, steady knock comes from outside the door. Elias stands up and drags his tired body toward the door.
  The moment his hand touches the doorknob, he feels an indescribable strangeness — as if something has been waiting for him on the other side of the door for a long time.
  Through the door, he sees the nun band. Shocked and terrified, he stumbles and falls to the ground.


Scene Title: Disappearance
  Description
    The music pours in, more like an infiltration than a sound. Elias does not resist. Tears roll down his eyes, numb. In the end, the shot reveals only the empty room.
